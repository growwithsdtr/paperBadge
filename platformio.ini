[platformio]
default_envs = PaperS3

[env:PaperS3]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino

upload_port = /dev/cu.usbmodem1101
monitor_port = /dev/cu.usbmodem1101
monitor_speed = 115200
upload_speed = 1500000

; PaperS3 / M5PaperS3 v1.2 is ESP32-S3R8: ESP32-S3, 8 MB OPI PSRAM,
; and 16 MB flash. PlatformIO does not currently expose a dedicated PaperS3
; board ID here, so this uses a conservative ESP32-S3 board plus PaperS3
; memory/display settings.
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

build_flags =
  -DESP32S3
  -DBOARD_HAS_PSRAM
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1

lib_deps =
  m5stack/M5Unified@^0.2.17
  m5stack/M5GFX@^0.2.22
  bblanchon/ArduinoJson@^7.4.2
